<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centers Network | Stado International</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Modern Location Search Styling */
        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
        }
        #suggestionBox {
            display: none;
            position: absolute;
            top: 58px;
            left: 0;
            width: 100%;
            background: #111;
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 12px;
            z-index: 2000;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            max-height: 300px;
            overflow-y: auto;
        }
        .suggestion-item {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
            text-align: left;
            display: flex;
            flex-direction: column;
        }
        .suggestion-item:hover {
            background: rgba(212, 175, 55, 0.1);
        }
        .place-name {
            color: var(--primary-color);
            font-weight: 600;
            font-size: 0.95rem;
        }
        .place-sub {
            color: #888;
            font-size: 0.75rem;
            margin-top: 2px;
        }
        .loader-dots {
            font-size: 0.8rem;
            color: var(--primary-color);
            position: absolute;
            right: 15px;
            top: 18px;
            display: none;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo-container">
                <img src="images/stado_emblem_compressed.png" alt="Stado Logo">
                <span class="logo-text">STADO</span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="programs.html">Programs</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding-top: 120px;">
        <section class="container">
            <div class="text-center" style="margin-bottom: 40px;">
                <h1 style="font-size: clamp(2.2rem, 7vw, 3.2rem); text-transform: uppercase;">STADO Centers Network</h1>
                
                <div style="margin-top: 35px; display: flex; flex-direction: column; align-items: center; gap: 15px;">
                    <div class="search-wrapper">
                        <span style="position: absolute; left: 18px; top: 18px; color: var(--primary-color); z-index: 5;">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        </span>
                        
                        <input type="text" id="citySearch" class="form-control" 
                               placeholder="Search for any city or town..." 
                               style="width: 100%; padding-left: 52px; margin: 0; background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.25); height: 54px; border-radius: 12px;"
                               autocomplete="off">
                        
                        <div id="searchLoader" class="loader-dots">Searching...</div>

                        <div id="suggestionBox"></div>
                    </div>

                    <button id="gpsBtn" class="btn btn-outline" style="font-size: 0.85rem; padding: 12px 25px; border-radius: 30px;">
                        📍 Find Nearest to Me
                    </button>
                </div>
                
                <p id="locationStatus" style="font-size: 0.85rem; color: var(--primary-color); margin-top: 15px; min-height: 20px; font-weight: 500;"></p>
            </div>

            <div id="full-centers-grid" class="grid-container">
                <p style="text-align: center; grid-column: 1/-1; opacity: 0.6;">Loading network...</p>
            </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script>
        let allCenters = [];
        let debounceTimer;

        async function getSupabase() {
            return new Promise((resolve) => {
                const check = setInterval(() => {
                    if (window.supabaseClient) {
                        clearInterval(check);
                        resolve(window.supabaseClient);
                    }
                }, 100);
            });
        }

        async function startNetwork() {
            const supabase = await getSupabase();
            try {
                const { data, error } = await supabase
                    .from('centers')
                    .select('*')
                    .eq('status', 'active');
                if (error) throw error;
                allCenters = data; 
                renderCenters(allCenters);
            } catch (err) { console.error(err); }
        }

        function renderCenters(data) {
            const grid = document.getElementById('full-centers-grid');
            grid.innerHTML = data.length ? data.map(center => {
                const dList = Array.isArray(center.disciplines) ? center.disciplines : (center.disciplines || "").split(',');
                return `
                    <div class="card reveal active" style="opacity:1 !important; display: flex; flex-direction: column;">
                        <h3 style="margin-bottom: 5px;">${center.name}</h3>
                        <p style="color: var(--primary-color); font-weight: 600; font-size: 0.8rem; margin-bottom: 12px;">${center.city.toUpperCase()}</p>
                        <div style="display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 20px; flex-grow: 1;">
                            ${dList.map(d => `<span style="font-size: 0.6rem; background: rgba(212,175,55,0.1); padding: 3px 8px; border-radius: 4px; color: var(--primary-color); border: 1px solid rgba(212,175,55,0.2);">${d.trim()}</span>`).join('')}
                        </div>
                        <a href="center/index.html?id=${center.id}" class="btn btn-outline" style="width: 100%; text-align: center; font-size: 0.85rem;">View Center</a>
                    </div>
                `;
            }).join('') : "<p style='grid-column: 1/-1; text-align: center;'>No centers found.</p>";
        }

        // --- REAL WORLD LOCATION SEARCH (PHOTON API) ---
        const searchInput = document.getElementById('citySearch');
        const suggestionBox = document.getElementById('suggestionBox');
        const statusText = document.getElementById('locationStatus');
        const loader = document.getElementById('searchLoader');

        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            const val = e.target.value.trim();
            
            if (val.length < 3) {
                suggestionBox.style.display = 'none';
                return;
            }

            debounceTimer = setTimeout(() => {
                fetchLocations(val);
            }, 500); // 500ms Debounce
        });

        async function fetchLocations(query) {
            loader.style.display = 'block';
            try {
                // Photon API targeting India
                const res = await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&limit=6&lat=10.8505&lon=76.2711`);
                const data = await res.json();
                
                if (data.features && data.features.length > 0) {
                    showSuggestions(data.features);
                } else {
                    suggestionBox.innerHTML = '<div class="suggestion-item">No locations found</div>';
                    suggestionBox.style.display = 'block';
                }
            } catch (err) {
                console.error("Map Search Error:", err);
            } finally {
                loader.style.display = 'none';
            }
        }

        function showSuggestions(features) {
            suggestionBox.style.display = 'block';
            suggestionBox.innerHTML = features.map(f => {
                const p = f.properties;
                const label = [p.name, p.city, p.state].filter(Boolean).join(', ');
                return `
                    <div class="suggestion-item" onclick="selectLocation(${f.geometry.coordinates[1]}, ${f.geometry.coordinates[0]}, '${p.name}')">
                        <span class="place-name">📍 ${p.name || ''}</span>
                        <span class="place-sub">${p.city || ''} ${p.state || ''}, India</span>
                    </div>
                `;
            }).join('');
        }

        window.selectLocation = (lat, lon, name) => {
            searchInput.value = name;
            suggestionBox.style.display = 'none';
            sortCentersByDistance(lat, lon);
            statusText.innerText = `Showing centers nearest to ${name}`;
        };

        function sortCentersByDistance(lat, lon) {
            const sorted = [...allCenters].sort((a, b) => {
                const distA = calcDist(lat, lon, a.latitude, a.longitude);
                const distB = calcDist(lat, lon, b.latitude, b.longitude);
                return distA - distB;
            });
            renderCenters(sorted);
        }

        // --- GPS LOGIC ---
        document.getElementById('gpsBtn').addEventListener('click', () => {
            if (!navigator.geolocation) return alert("GPS not supported.");
            statusText.innerText = "Accessing GPS...";
            navigator.geolocation.getCurrentPosition((pos) => {
                sortCentersByDistance(pos.coords.latitude, pos.coords.longitude);
                statusText.innerText = "Showing nearest centers based on your location";
            });
        });

        function calcDist(lat1, lon1, lat2, lon2) {
            if (!lat2 || !lon2) return 9999;
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-wrapper')) suggestionBox.style.display = 'none';
        });

        document.addEventListener("DOMContentLoaded", startNetwork);
    </script>
</body>
</html>

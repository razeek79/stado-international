    <header>

                <img src="images/gallery/img4.jpg" alt="Gallery Image 4" class="gallery-item" onerror="this.src='images/stado_emblem_compressed.png'">
            </div>
        </section>

        <div id="lightbox" class="lightbox">
            <span id="close-lightbox" class="close-lightbox">&times;</span>
            <img id="lightbox-img" src="" alt="Popup Image">
        </div>

    <footer>

        <div class="footer-socials">

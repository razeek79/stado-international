<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission | STADO INTERNATIONAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <style>
        :root {
            --primary-red: #A51C30;
            --primary-red-hover: #871626;
            --bg-dark: #000000;
            --glass-white: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-silver: #F5F5F7;
            --text-grey: #888888;
            --font-heading: 'Oswald', sans-serif;
            --font-body: 'Montserrat', sans-serif;
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-silver);
            font-family: var(--font-body);
            padding-bottom: 80px;
            overflow-x: hidden;
        }

        /* Navigation */
        header {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
        }

        .navbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 5%; 
            max-width: 1400px;
            margin: 0 auto;
        }

        .logo-container { display: flex; align-items: center; gap: 12px; }
        .logo-container img { width: 35px; height: 35px; }
        .logo-text { font-family: var(--font-heading); font-size: 1.2rem; letter-spacing: 2px; }

        /* Container & Card */
        .admission-container {
            max-width: 850px;
            margin: 120px auto 40px;
            padding: 0 20px;
        }

        .admission-card {
            background: var(--glass-white);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            border-radius: 32px;
            padding: clamp(25px, 5vw, 50px);
            width: 100%;
        }

        .header-section { text-align: center; margin-bottom: 40px; }
        .header-section h1 { font-family: var(--font-heading); font-size: clamp(2rem, 8vw, 3.5rem); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        #subHeading { color: var(--primary-red); font-weight: 700; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 2px; }

        /* Form Grid */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .full-width { grid-column: span 2; }

        label {
            color: var(--text-grey);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-control {
            background: #111;
            border: 1px solid #333;
            color: #fff;
            border-radius: 14px;
            padding: 14px 18px;
            font-family: var(--font-body);
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .form-control:focus { border-color: var(--primary-red); outline: none; background: #161616; box-shadow: 0 0 0 4px rgba(165, 28, 48, 0.1); }
        .form-control[readonly] { background: rgba(165, 28, 48, 0.05); color: var(--primary-red); cursor: not-allowed; border-color: rgba(165, 28, 48, 0.2); }

        .form-section-title {
            grid-column: span 2;
            border-left: 4px solid var(--primary-red);
            padding-left: 15px;
            margin: 35px 0 15px;
            font-family: var(--font-heading);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Conditional Elements */
        .conditional-field { display: none; animation: slideDown 0.4s ease forwards; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Payment Summary */
        .payment-box {
            grid-column: span 2;
            background: rgba(165, 28, 48, 0.05);
            border: 1px solid rgba(165, 28, 48, 0.2);
            padding: 25px;
            border-radius: 18px;
            margin-top: 20px;
        }

        .payment-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .payment-total { font-size: 1.4rem; font-weight: 700; color: #fff; font-family: var(--font-heading); }

        /* Button */
        .submit-btn {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 50px;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
            margin-top: 30px;
            text-transform: uppercase;
        }

        .submit-btn:hover:not(:disabled) { background: var(--primary-red-hover); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(165, 28, 48, 0.3); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* System Overlays */
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--primary-red); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .full-width, .form-section-title, .payment-box { grid-column: span 1; }
            .admission-container { margin-top: 90px; }
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo-container">
                <img src="../images/stado_emblem_compressed.png" alt="STADO Logo">
                <span class="logo-text">STADO</span>
            </div>
            <div style="font-size: 0.8rem; font-weight: 600; letter-spacing: 1px;">ADMISSION PORTAL</div>
        </nav>
    </header>

    <main class="admission-container">
        <div class="header-section">
            <h1>Admission</h1>
            <p id="subHeading">Initiating your path to excellence</p>
        </div>

        <div class="admission-card">
            <form id="admissionForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Selected Centre</label>
                        <input type="text" id="preferred_center" class="form-control" readonly required>
                    </div>
                    <div class="form-group">
                        <label>Preferred Discipline</label>
                        <input type="text" id="preferred_activity" class="form-control" readonly required>
                    </div>

                    <div class="form-section-title">Personal Information</div>
                    
                    <div class="form-group full-width">
                        <label>Full Name *</label>
                        <input type="text" id="full_name" class="form-control" required placeholder="Legal name as per ID">
                    </div>

                    <div class="form-group">
                        <label>Date of Birth *</label>
                        <input type="date" id="dob" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Gender *</label>
                        <select id="gender" class="form-control" required>
                            <option value="" disabled selected>Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group full-width conditional-field" id="guardian_group">
                        <label>Guardian Name (Required for Minors) *</label>
                        <input type="text" id="guardian_name" class="form-control" placeholder="Name of Parent or Legal Guardian">
                    </div>

                    <div class="form-group">
                        <label>Applicant Category *</label>
                        <select id="applicant_type" class="form-control" required>
                            <option value="" disabled selected>Choose Category</option>
                            <option value="Student">Student</option>
                            <option value="Working Professional">Working Professional</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group conditional-field" id="student_group">
                        <label>Standard / Educational Year *</label>
                        <input type="text" id="standard" class="form-control" placeholder="e.g., 10th Grade, Final Year B.A">
                    </div>

                    <div class="form-group conditional-field" id="pro_group">
                        <label>Current Occupation *</label>
                        <input type="text" id="occupation" class="form-control" placeholder="Job Title / Business">
                    </div>

                    <div class="form-section-title">Contact Details</div>

                    <div class="form-group">
                        <label>WhatsApp Contact *</label>
                        <input type="tel" id="phone" class="form-control" required placeholder="+91">
                    </div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="example@email.com">
                    </div>

                    <div class="form-group full-width">
                        <label>Full Residential Address *</label>
                        <textarea id="address" class="form-control" rows="3" required placeholder="Street, City, PIN Code"></textarea>
                    </div>

                    <div class="payment-box">
                        <div class="payment-row">
                            <span style="font-weight: 600; color: var(--text-grey);">Admission Processing Fee</span>
                            <span class="payment-total">₹500.00</span>
                        </div>
                        <p style="font-size: 0.7rem; color: var(--text-grey); margin-top: 10px; line-height: 1.4;">
                            Note: This is a secure payment. Your admission details will be saved to our official records only after a successful transaction.
                        </p>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Proceed to Payment</button>
            </form>
        </div>
    </main>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <h4 id="loadingText">Processing Security...</h4>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const admissionForm = document.getElementById('admissionForm');
            const submitBtn = document.getElementById('submitBtn');
            const overlay = document.getElementById('loading-overlay');
            const loadingText = document.getElementById('loadingText');
            const dobInput = document.getElementById('dob');
            const applicantType = document.getElementById('applicant_type');

            // URL Parameter Auto-fill
            const params = new URLSearchParams(window.location.search);
            const centerVal = params.get('center');
            const programVal = params.get('program');

            if (centerVal && programVal) {
                document.getElementById('preferred_center').value = decodeURIComponent(centerVal);
                document.getElementById('preferred_activity').value = decodeURIComponent(programVal);
                document.getElementById('subHeading').innerText = `${decodeURIComponent(programVal)} Admission @ STADO ${decodeURIComponent(centerVal)}`;
            }

            // UI Logic
            dobInput.addEventListener('change', function() {
                const age = new Date().getFullYear() - new Date(this.value).getFullYear();
                const group = document.getElementById('guardian_group');
                if (this.value && age < 18) group.style.display = 'flex';
                else group.style.display = 'none';
            });

            applicantType.addEventListener('change', function() {
                document.getElementById('student_group').style.display = (this.value === 'Student') ? 'flex' : 'none';
                document.getElementById('pro_group').style.display = (this.value === 'Working Professional') ? 'flex' : 'none';
            });

            // Submission Logic
            admissionForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // CRITICAL CHECK: Ensure Razorpay is loaded
                if (typeof window.Razorpay === 'undefined') {
                    alert("Payment gateway is still loading. Please wait 2 seconds and try again.");
                    return;
                }

                submitBtn.disabled = true;
                overlay.style.display = 'flex';
                loadingText.innerText = "Securing Session...";

                try {
                    const admissionPayload = {
                        full_name: document.getElementById('full_name').value.trim(),
                        gender: document.getElementById('gender').value,
                        dob: dobInput.value,
                        phone: document.getElementById('phone').value,
                        email: document.getElementById('email').value,
                        address: document.getElementById('address').value,
                        applicant_type: applicantType.value,
                        preferred_center: document.getElementById('preferred_center').value,
                        preferred_activity: document.getElementById('preferred_activity').value,
                        guardian_name: document.getElementById('guardian_name')?.value || null,
                        standard: document.getElementById('standard')?.value || null,
                        occupation: document.getElementById('occupation')?.value || null,
                        application_year: new Date().getFullYear()
                    };

                    // STEP 1: Create Order via Edge Function
                    const { data: order, error: orderErr } = await window.supabaseClient.functions.invoke('razorpay-portal', {
                        body: { action: 'create_order', amount: 500 }
                    });

                    if (orderErr || !order.id) throw new Error("Failed to initialize secure payment.");

                    const options = {
                        "key": "rzp_test_SnAm5F5GVfZZIZ", 
                        "amount": order.amount,
                        "currency": "INR",
                        "name": "STADO International",
                        "order_id": order.id,
                        "prefill": {
                            "name": admissionPayload.full_name,
                            "email": admissionPayload.email,
                            "contact": admissionPayload.phone
                        },
                        "theme": { "color": "#A51C30" },
                        "handler": async function (response) {
                            overlay.style.display = 'flex';
                            loadingText.innerText = "Verifying Transaction...";

                            const { data: verifyData, error: verifyErr } = await window.supabaseClient.functions.invoke('razorpay-portal', {
                                body: {
                                    action: 'verify_and_save',
                                    razorpay_order_id: response.razorpay_order_id,
                                    razorpay_payment_id: response.razorpay_payment_id,
                                    razorpay_signature: response.razorpay_signature,
                                    admission_payload: admissionPayload
                                }
                            });

                            if (verifyErr || !verifyData.success) throw new Error("Verification Failed.");

                            overlay.style.display = 'none';
                            alert("Admission Successful!");
                            window.location.href = "../index.html";
                        },
                        "modal": {
                            "ondismiss": function() {
                                overlay.style.display = 'none';
                                submitBtn.disabled = false;
                            }
                        }
                    };

                    const rzp = new window.Razorpay(options);
                    overlay.style.display = 'none';
                    rzp.open();

                } catch (err) {
                    overlay.style.display = 'none';
                    submitBtn.disabled = false;
                    alert("Error: " + err.message);
                }
            });
        });
    </script>
</body>
</html>

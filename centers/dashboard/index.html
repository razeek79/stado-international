<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centre Dashboard | STADO International</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../config.js"></script>
    <style>
        .dash-layout { display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #fff; border-right: 1px solid var(--border-soft); padding: 30px 20px; }
        .main-content { flex: 1; padding: 40px; background: var(--studio-bg); }
        .nav-item { 
            padding: 12px 15px; border-radius: 12px; cursor: pointer; 
            margin-bottom: 5px; font-weight: 600; color: var(--text-dim); transition: 0.2s;
        }
        .nav-item:hover { background: var(--studio-bg); color: var(--primary-blue); }
        .nav-item.active { background: rgba(0, 113, 227, 0.1); color: var(--primary-blue); }
        
        @media (max-width: 768px) {
            .dash-layout { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border-soft); padding: 15px; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="dash-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div style="margin-bottom: 40px; text-align: center;">
                <img src="../../images/stado_emblem_compressed.png" width="40">
                <h3 style="font-size: 1rem; margin-top: 10px;">STADO Centre</h3>
            </div>
            <nav id="sidebarNav">
                <div class="nav-item active" onclick="switchSection('overview', this)">Overview</div>
                <div class="nav-item" onclick="switchSection('timings', this)">Program Timings</div>
                <div class="nav-item" onclick="switchSection('settings', this)">Centre Details</div>
                <div class="nav-item" onclick="handleLogout()" style="margin-top: 50px; color: #ff3b30;">Logout</div>
            </nav>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <div id="loader" style="text-align: center; margin-top: 50px;">Verifying Security...</div>
            
            <div id="dashboardUI" style="display: none;">
                <header style="margin-bottom: 30px;">
                    <h1 id="welcomeText" style="font-size: 1.8rem; margin: 0;">Loading...</h1>
                    <p id="subText" style="color: var(--text-dim);"></p>
                </header>

                <!-- SECTION: OVERVIEW -->
                <section id="overviewSection" class="premium-card" style="max-width: 100%;">
                    <h3>Active Summary</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;">
                        <div class="glass-input" style="text-align: center; background: #fff;">
                            <span class="label-text">Managed Programs</span>
                            <h2 id="progCount">0</h2>
                        </div>
                    </div>
                </section>

                <!-- SECTION: TIMINGS (Add/Edit Timings here) -->
                <section id="timingsSection" style="display: none;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h3>Weekly Schedule</h3>
                        <button class="btn-round btn-premium" style="width: auto; padding: 10px 20px;">+ New Slot</button>
                    </div>
                    <div id="slotsGrid" style="display: grid; gap: 15px;"></div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const sb = window.supabaseClient;
        let currentCentre = null;

        /**
         * SECURE GATEKEEPER:
         * This checks if the Google account belongs to an active center.
         */
        async function gatekeeper() {
            const { data: { user } } = await sb.auth.getUser();
            
            if (!user) {
                location.href = '../login/';
                return;
            }

            // Check if this specific email is in our authorized centers table
            const { data: center, error } = await sb
                .from('centers')
                .select('*')
                .eq('email', user.email)
                .single();

            if (error || !center || center.status !== 'active') {
                console.error("Security Breach: Unauthorized account.");
                await sb.auth.signOut();
                location.href = '../login/?error=unauthorized';
                return;
            }

            // If we reach here, the user is authorized
            currentCentre = center;
            initDashboardUI();
        }

        function initDashboardUI() {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('dashboardUI').style.display = 'block';
            document.getElementById('welcomeText').innerText = `Welcome, ${currentCentre.name}`;
            document.getElementById('subText').innerText = `${currentCentre.city} Centre Management`;
            document.getElementById('progCount').innerText = currentCentre.disciplines?.length || 0;
        }

        function switchSection(section, el) {
            // UI Toggle Logic
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
            
            document.getElementById('overviewSection').style.display = section === 'overview' ? 'block' : 'none';
            document.getElementById('timingsSection').style.display = section === 'timings' ? 'block' : 'none';
        }

        async function handleLogout() {
            await sb.auth.signOut();
            location.href = '../login/';
        }

        // Run security check on load
        gatekeeper();
    </script>
</body>
</html>
